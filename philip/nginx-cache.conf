# ============================================================
# Cache-Control — Restaurant Philip
# À inclure dans le bloc server{} de ta config Nginx
# ============================================================

# Images, fonts, vidéos : 1 an
location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|mp4|webm|woff|woff2|ttf|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary Accept-Encoding;
}

# CSS et JS : 1 an (les fichiers sont versionnés ou peu modifiés)
location ~* \.(css|js)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# HTML : pas de cache (le contenu peut changer)
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}
