# ─── QRMenu — Nginx config ────────────────────────────────────────────────────
# Replace YOUR_DOMAIN with your actual domain (e.g. menu.monservice.fr)
# SSL certificates managed by Certbot / Let's Encrypt

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Static frontend ───────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|ttf|eot|otf|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Images: moderate cache
    location ~* \.(jpe?g|png|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML: no cache (always fresh)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # ── Menu route: /resto-slug → menu.html (slug passed as query param) ─────
    # Pattern: /m/slug → menu.html?slug=slug
    location ~ ^/m/([a-z0-9-]+)$ {
        rewrite ^/m/([a-z0-9-]+)$ /menu.html?slug=$1 last;
    }

    # ── PocketBase API proxy ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://pocketbase:8090/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / Realtime subscriptions
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 900s;

        # File upload limit
        client_max_body_size 20M;
    }

    # PocketBase Admin UI (optional — remove if you don't want it public)
    location /_/ {
        proxy_pass http://pocketbase:8090/_/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fallback → index.html (SPA-friendly)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
