version: "3.8"

services:

  # ─── PocketBase ─────────────────────────────────────────────────────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: qrmenu_pocketbase
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
      - pb_migrations:/pb/pb_migrations
      - pb_public:/pb/pb_public   # static files served by PocketBase
    expose:
      - "8090"
    environment:
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend static files (Nginx) ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: qrmenu_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../:/usr/share/nginx/html:ro     # serve project root (index.html, menu.html, admin.html…)
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - pocketbase

volumes:
  pb_data:
  pb_migrations:
  pb_public:
