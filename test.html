<html lang="fr">
<head>

  <title>Test 1</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
    h1 { color: #333; }
    .box { background: tomato; color: white; padding: 1rem; border-radius: 8px; margin: 1rem 0; width: fit-content; }
    button { padding: 0.5rem 1.2rem; border: none; background: #6c63ff; color: white; border-radius: 6px; cursor: pointer; font-size: 1rem; }

<body>

  <div class="box">Connerie n°1 — une boîte rouge inutile</div>

  <p>Connerie n°2 — un bouton qui fait une alert :</p>
  <button onclick="alert('Bonjour la Terre 👋')">Clique moi</button>

  <p style="margin-top:1.5rem">Connerie n°3 — une liste de trucs :</p>
  <ul>
    <li>Pain au chocolat</li>
    <li>Croissant</li>
    <li>Chausson aux pommes</li>
  </ul>

</html>
