<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICE COMPRIS | Digital CHR Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            overflow: hidden;
        }
        .glow-effect {
            filter: drop-shadow(0 0 30px rgba(190, 242, 100, 0.2));
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
        }
        .contact-link::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: #bef264;
            transition: width .3s;
        }
        .contact-link:hover::after {
            width: 100%;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-lime-400/5 via-transparent to-transparent"></div>

    <main class="relative z-10 flex flex-col items-center w-full max-w-2xl text-center">
        
        <div class="glow-effect mb-16">
            <img src="assets/logo_service.png" alt="SERVICE COMPRIS" class="w-full h-auto max-w-[500px] md:max-w-[600px]">
        </div>

        <div class="flex flex-col items-center space-y-4">
            <span class="text-slate-500 uppercase tracking-[0.5em] text-[10px] font-black">Get in touch</span>
            <a href="mailto:contact@servicecompris.pro" 
               class="contact-link text-2xl md:text-4xl font-[900] text-lime-400 italic tracking-tighter transition-all duration-300">
                contact@servicecompris.pro
            </a>
        </div>

    </main>

    <footer class="absolute bottom-10 z-10">
        <p class="text-[10px] text-slate-700 uppercase tracking-[0.4em] font-black">
            © 2026 • StreamMate AI, Inc. USA
        </p>
    </footer>

</body>
</html>
