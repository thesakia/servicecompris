<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Compris — Bientôt disponible</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Animated gradient orbs */
    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -120px; left: -80px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -100px; right: -60px;
      animation-delay: -5s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: #38bdf8;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -8s;
      opacity: 0.09;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.05); }
      66%       { transform: translate(-20px, 15px) scale(0.97); }
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
    }

    /* Layout */
    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* Logo / Brand */
    .brand {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 1.2rem;
    }
    .brand span {
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tagline */
    .tagline {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--muted);
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 2.8rem;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      margin: 0 auto 2.8rem;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 380px;
      width: 100%;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(108,99,255,0.35); }

    .card-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .card-text {
      text-align: left;
    }
    .card-text strong {
      display: block;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 2px;
    }
    .card-text a {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .card-text a:hover { color: var(--accent); }

    /* Footer */
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      z-index: 2;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main>
    <div class="badge">
      <span class="badge-dot"></span>
      En construction
    </div>

    <h1 class="brand">Service<br><span>Compris</span></h1>

    <p class="tagline">
      Quelque chose de bien arrive.<br>
      On travaille dessus, revenez bientôt.
    </p>

    <div class="divider"></div>
  </main>

  <footer>© 2026 Service Compris</footer>

</body>
</html>
