<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Compris — Bientôt disponible</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b1624;
      --navy:    #0f1e30;
      --green:   #86d62a;
      --green2:  #5fa81e;
      --white:   #ffffff;
      --muted:   #5a7a9a;
      --border:  rgba(134,214,42,0.15);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow: hidden;
    }

    /* Glow orbs */
    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      animation: drift 14s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: var(--green);
      opacity: 0.07;
      top: -150px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: var(--green);
      opacity: 0.05;
      bottom: -120px; right: -80px;
      animation-delay: -6s;
    }
    .orb-3 {
      width: 600px; height: 600px;
      background: #1a3a5c;
      opacity: 0.4;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -10s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      40%       { transform: translate(25px, -18px); }
      70%       { transform: translate(-15px, 20px); }
    }

    /* Hexagon background shape */
    .hex-bg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(560px, 90vw);
      opacity: 0.04;
      z-index: 0;
      pointer-events: none;
    }

    /* Layout */
    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(134,214,42,0.08);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 2.5rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* Brand */
    .brand {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .brand .service  { color: var(--white); display: block; }
    .brand .compris  { color: var(--green); display: block; }

    /* Tagline */
    .tagline-sub {
      font-size: clamp(0.6rem, 1.5vw, 0.78rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 2.5rem;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .divider-hex {
      width: 10px; height: 10px;
      background: var(--green);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      opacity: 0.6;
    }

    /* Message */
    .message {
      font-size: clamp(0.88rem, 2vw, 1rem);
      color: var(--muted);
      line-height: 1.7;
      max-width: 360px;
    }
    .message strong { color: var(--white); font-weight: 600; }

    /* Footer */
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 2;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Hexagon SVG background -->
  <svg class="hex-bg" viewBox="0 0 200 230" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="100,5 190,52 190,178 100,225 10,178 10,52" stroke="white" stroke-width="3" fill="none"/>
  </svg>

  <main>
    <div class="badge">
      <span class="badge-dot"></span>
      En construction
    </div>

    <h1 class="brand">
      <span class="service">Service</span>
      <span class="compris">Compris</span>
    </h1>

    <p class="tagline-sub">Digital CHR Intelligence</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-hex"></div>
      <div class="divider-line"></div>
    </div>

    <p class="message">
      Quelque chose de <strong>bien</strong> arrive.<br>
      On travaille dessus, revenez bientôt.
    </p>
  </main>

  <footer>© 2026 Service Compris — Digital CHR Intelligence</footer>

</body>
</html>
